<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TvLink 配色方向</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #080a0b;
      color: #f1f4f2;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button { font: inherit; }
    .page { width: min(1480px, calc(100% - 36px)); margin: 0 auto; padding: 34px 0 54px; }
    .intro { display: flex; justify-content: space-between; align-items: end; gap: 20px; margin-bottom: 22px; }
    h1 { margin: 0 0 7px; font-size: 24px; }
    .intro p { margin: 0; color: #919b96; font-size: 14px; }
    .hint { border: 1px solid #303638; border-radius: 6px; padding: 8px 11px; color: #c4cbc7; font-size: 12px; }
    .options { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; align-items: start; }
    .option {
      display: block;
      width: 100%;
      padding: 0;
      color: var(--text);
      text-align: left;
      background: transparent;
      border: 1px solid var(--edge);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }
    .option:hover { transform: translateY(-2px); border-color: var(--accent); }
    .option.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--selection); }
    .mint {
      --page: #0f1313; --panel: #161b1a; --panel2: #111514; --edge: #303936;
      --text: #edf3ef; --muted: #8f9c95; --accent: #65d6a6; --selection: rgba(101,214,166,.17);
      --actual: #29483d; --actualEdge: #527e6b; --estimate: #bdd0c7; --track: #090c0b;
      --ready: #65d6a6; --readyBg: rgba(101,214,166,.09); --warning: #e9b85d;
    }
    .ice {
      --page: #090e12; --panel: #111920; --panel2: #0d1318; --edge: #283946;
      --text: #eef5f8; --muted: #8598a4; --accent: #70c9f3; --selection: rgba(112,201,243,.17);
      --actual: #203b4b; --actualEdge: #4e7890; --estimate: #b6d9e9; --track: #060a0d;
      --ready: #77d2ad; --readyBg: rgba(119,210,173,.09); --warning: #ff9080;
    }
    .amber {
      --page: #11100d; --panel: #1b1914; --panel2: #15130f; --edge: #403a2c;
      --text: #f5f2e9; --muted: #a29b89; --accent: #efbc55; --selection: rgba(239,188,85,.17);
      --actual: #514321; --actualEdge: #8b7338; --estimate: #e5d39f; --track: #0b0a08;
      --ready: #83d2a6; --readyBg: rgba(131,210,166,.09); --warning: #ed8c73;
    }
    .option-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 15px; background: var(--panel2); border-bottom: 1px solid var(--edge); }
    .title { display: flex; align-items: center; gap: 10px; }
    .letter { display: grid; place-items: center; width: 26px; height: 26px; border: 1px solid var(--edge); border-radius: 5px; color: var(--accent); font-size: 12px; font-weight: 800; }
    h2 { margin: 0; font-size: 14px; }
    .tone { color: var(--muted); font-size: 9px; text-transform: uppercase; }
    .mock { min-height: 618px; padding: 17px; background: var(--page); }
    .brandbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
    .brand { font-size: 13px; font-weight: 760; }
    .live { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 9px; text-transform: uppercase; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ready); box-shadow: 0 0 0 3px var(--readyBg); }
    .total { margin-bottom: 13px; padding: 16px; background: var(--panel); border: 1px solid var(--edge); border-radius: 7px; }
    .total-top { display: flex; align-items: end; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
    .eyebrow { color: var(--muted); font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .big { margin-top: 5px; font-size: 27px; line-height: 1; font-weight: 760; font-variant-numeric: tabular-nums; }
    .big span { color: var(--muted); font-size: 12px; }
    .percent { color: var(--accent); font-size: 13px; font-weight: 700; }
    .progress { position: relative; height: 14px; background: var(--track); border-radius: 3px; }
    .projected { position: absolute; z-index: 1; inset: 0 auto 0 0; border: 1px dashed var(--estimate); border-radius: 3px; background: transparent; }
    .actual { position: absolute; z-index: 2; top: 3px; bottom: 3px; left: 3px; background: var(--actual); border: 1px solid var(--actualEdge); border-radius: 2px; }
    .legend { display: flex; flex-wrap: wrap; gap: 7px 14px; margin-top: 11px; color: var(--muted); font-size: 9px; }
    .legend b { color: var(--text); font-weight: 650; }
    .mark { display: inline-block; width: 12px; height: 6px; margin-right: 4px; vertical-align: middle; border-radius: 1px; }
    .mark.actual-mark { background: var(--actual); border: 1px solid var(--actualEdge); }
    .mark.estimate-mark { background: transparent; border: 1px dashed var(--estimate); }
    .list { border-top: 1px solid var(--edge); }
    .row { padding: 14px 2px 13px; border-bottom: 1px solid var(--edge); }
    .row-top { display: grid; grid-template-columns: minmax(90px, 1fr) auto; gap: 10px; align-items: center; margin-bottom: 11px; }
    .keyline { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .key { overflow: hidden; font-size: 12px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
    .status { padding: 3px 6px; border-radius: 4px; font-size: 8px; font-weight: 760; text-transform: uppercase; }
    .ready { color: var(--ready); background: var(--readyBg); border: 1px solid color-mix(in srgb, var(--ready) 24%, transparent); }
    .cooling { color: var(--warning); background: color-mix(in srgb, var(--warning) 8%, transparent); border: 1px solid color-mix(in srgb, var(--warning) 24%, transparent); }
    .number { color: var(--text); font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .number em { color: var(--estimate); font-style: normal; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px 13px; margin-top: 9px; color: var(--muted); font-size: 8px; }
    .meta strong { color: var(--text); font-weight: 650; }
    .option-foot { padding: 15px; background: var(--panel2); border-top: 1px solid var(--edge); }
    .option-foot strong { display: block; margin-bottom: 5px; font-size: 12px; }
    .option-foot p { margin: 0; color: var(--muted); font-size: 11px; line-height: 1.5; }
    .footer-note { margin-top: 18px; color: #8e9893; text-align: center; font-size: 12px; }
    @media (max-width: 1040px) { .options { grid-template-columns: 1fr; } .mock { min-height: auto; } }
    @media (max-width: 620px) { .page { width: min(calc(100% - 20px), 1480px); padding-top: 22px; } .intro { align-items: start; flex-direction: column; } }
  </style>
</head>
<body>
  <main class="page">
    <header class="intro">
      <div><h1>叠加进度条 · 配色比较</h1><p>三套方案使用完全相同的 A 布局；实心实际用量盖在虚线预计总量之上。</p></div>
      <div class="hint">点击你最喜欢的一套</div>
    </header>
    <section class="options">

      <button class="option mint" data-choice="a-mint" onclick="toggleSelect(this)">
        <div class="option-head"><div class="title"><span class="letter">A</span><h2>炭黑 × 薄荷</h2></div><span class="tone">calm / balanced</span></div>
        <div class="mock">
          <div class="brandbar"><span class="brand">TVLINK / USAGE</span><span class="live"><i class="dot"></i> live</span></div>
          <div class="total">
            <div class="total-top"><div><div class="eyebrow">总用量</div><div class="big">740 <span>(+55) / 1,500</span></div></div><span class="percent">53.0%</span></div>
            <div class="progress"><div class="projected" style="width:53%"></div><div class="actual" style="width:49.3%"></div></div>
            <div class="legend"><span><i class="mark actual-mark"></i>实际 49.3%</span><span><i class="mark estimate-mark"></i>预计 53.0%</span><span>预计剩余 <b>705</b></span><span>可用 <b>2 / 3</b></span></div>
          </div>
          <div class="list">
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">primary-01</span><span class="status ready">ready</span></div><span class="number">210 <em>(+18)</em> / 500</span></div><div class="progress"><div class="projected" style="width:45.6%"></div><div class="actual" style="width:42%"></div></div><div class="meta"><span>实际更新 <strong>12 秒前</strong></span><span>预计剩余 <strong>272</strong></span><span>权重 <strong>272.00</strong></span></div></div>
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">primary-02</span><span class="status ready">ready</span></div><span class="number">330 <em>(+37)</em> / 500</span></div><div class="progress"><div class="projected" style="width:73.4%"></div><div class="actual" style="width:66%"></div></div><div class="meta"><span>实际更新 <strong>18 秒前</strong></span><span>预计剩余 <strong>133</strong></span><span>权重 <strong>133.00</strong></span></div></div>
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">backup-cn</span><span class="status cooling">cooling</span></div><span class="number">200 <em>(+0)</em> / 500</span></div><div class="progress"><div class="projected" style="width:40%"></div><div class="actual" style="width:40%"></div></div><div class="meta"><span>实际更新 <strong>23 秒前</strong></span><span>预计剩余 <strong>300</strong></span><span>重试 <strong>42 秒后</strong></span></div></div>
          </div>
        </div>
        <div class="option-foot"><strong>克制而有辨识度</strong><p>保留你刚才觉得“还行”的方向，但层次更干净。薄荷色只承担在线与重点信息，不会满屏发绿。</p></div>
      </button>

      <button class="option ice" data-choice="b-ice" onclick="toggleSelect(this)">
        <div class="option-head"><div class="title"><span class="letter">B</span><h2>墨黑 × 冰蓝</h2></div><span class="tone">technical / crisp</span></div>
        <div class="mock">
          <div class="brandbar"><span class="brand">TVLINK / USAGE</span><span class="live"><i class="dot"></i> live</span></div>
          <div class="total">
            <div class="total-top"><div><div class="eyebrow">总用量</div><div class="big">740 <span>(+55) / 1,500</span></div></div><span class="percent">53.0%</span></div>
            <div class="progress"><div class="projected" style="width:53%"></div><div class="actual" style="width:49.3%"></div></div>
            <div class="legend"><span><i class="mark actual-mark"></i>实际 49.3%</span><span><i class="mark estimate-mark"></i>预计 53.0%</span><span>预计剩余 <b>705</b></span><span>可用 <b>2 / 3</b></span></div>
          </div>
          <div class="list">
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">primary-01</span><span class="status ready">ready</span></div><span class="number">210 <em>(+18)</em> / 500</span></div><div class="progress"><div class="projected" style="width:45.6%"></div><div class="actual" style="width:42%"></div></div><div class="meta"><span>实际更新 <strong>12 秒前</strong></span><span>预计剩余 <strong>272</strong></span><span>权重 <strong>272.00</strong></span></div></div>
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">primary-02</span><span class="status ready">ready</span></div><span class="number">330 <em>(+37)</em> / 500</span></div><div class="progress"><div class="projected" style="width:73.4%"></div><div class="actual" style="width:66%"></div></div><div class="meta"><span>实际更新 <strong>18 秒前</strong></span><span>预计剩余 <strong>133</strong></span><span>权重 <strong>133.00</strong></span></div></div>
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">backup-cn</span><span class="status cooling">cooling</span></div><span class="number">200 <em>(+0)</em> / 500</span></div><div class="progress"><div class="projected" style="width:40%"></div><div class="actual" style="width:40%"></div></div><div class="meta"><span>实际更新 <strong>23 秒前</strong></span><span>预计剩余 <strong>300</strong></span><span>重试 <strong>42 秒后</strong></span></div></div>
          </div>
        </div>
        <div class="option-foot"><strong>更像工程控制台</strong><p>边界更锐利、数据对比最清楚，冰蓝有技术感；异常状态用珊瑚色，长时间盯着也不刺眼。</p></div>
      </button>

      <button class="option amber" data-choice="c-amber" onclick="toggleSelect(this)">
        <div class="option-head"><div class="title"><span class="letter">C</span><h2>石墨 × 琥珀</h2></div><span class="tone">warm / distinctive</span></div>
        <div class="mock">
          <div class="brandbar"><span class="brand">TVLINK / USAGE</span><span class="live"><i class="dot"></i> live</span></div>
          <div class="total">
            <div class="total-top"><div><div class="eyebrow">总用量</div><div class="big">740 <span>(+55) / 1,500</span></div></div><span class="percent">53.0%</span></div>
            <div class="progress"><div class="projected" style="width:53%"></div><div class="actual" style="width:49.3%"></div></div>
            <div class="legend"><span><i class="mark actual-mark"></i>实际 49.3%</span><span><i class="mark estimate-mark"></i>预计 53.0%</span><span>预计剩余 <b>705</b></span><span>可用 <b>2 / 3</b></span></div>
          </div>
          <div class="list">
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">primary-01</span><span class="status ready">ready</span></div><span class="number">210 <em>(+18)</em> / 500</span></div><div class="progress"><div class="projected" style="width:45.6%"></div><div class="actual" style="width:42%"></div></div><div class="meta"><span>实际更新 <strong>12 秒前</strong></span><span>预计剩余 <strong>272</strong></span><span>权重 <strong>272.00</strong></span></div></div>
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">primary-02</span><span class="status ready">ready</span></div><span class="number">330 <em>(+37)</em> / 500</span></div><div class="progress"><div class="projected" style="width:73.4%"></div><div class="actual" style="width:66%"></div></div><div class="meta"><span>实际更新 <strong>18 秒前</strong></span><span>预计剩余 <strong>133</strong></span><span>权重 <strong>133.00</strong></span></div></div>
            <div class="row"><div class="row-top"><div class="keyline"><span class="key">backup-cn</span><span class="status cooling">cooling</span></div><span class="number">200 <em>(+0)</em> / 500</span></div><div class="progress"><div class="projected" style="width:40%"></div><div class="actual" style="width:40%"></div></div><div class="meta"><span>实际更新 <strong>23 秒前</strong></span><span>预计剩余 <strong>300</strong></span><span>重试 <strong>42 秒后</strong></span></div></div>
          </div>
        </div>
        <div class="option-foot"><strong>温暖但不复古</strong><p>琥珀色比常见蓝绿控制台更有个性，适合长时间查看；整体略暖，视觉情绪也更明显。</p></div>
      </button>
    </section>
    <p class="footer-note">重点看进度条的读法是否自然，以及哪套颜色让你愿意长期打开。</p>
  </main>
</body>
</html>
