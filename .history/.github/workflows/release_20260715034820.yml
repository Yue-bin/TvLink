name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
            pack: tar.gz
          - os: windows
            arch: amd64
            ext: .exe
            pack: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }}" -o tvlink${{ matrix.ext }} ./cmd/tvlink

      - name: pack
        run: |
          artifact="tvlink_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir "$artifact"
          cp tvlink${{ matrix.ext }} "$artifact/"
          cp tvlink.example.toml "$artifact/"
          cp README.md "$artifact/"
          if [ "${{ matrix.os }}" = "linux" ]; then
            cp deploy/tvlink.service "$artifact/"
          fi
          if [ "${{ matrix.pack }}" = "tar.gz" ]; then
            tar czf "${artifact}.tar.gz" "$artifact"
          else
            zip -r "${artifact}.zip" "$artifact"
          fi

      - name: upload
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: tvlink_${{ github.ref_name }}_*.${{ matrix.pack }}
